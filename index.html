const useUndo = (initialValue, maxHistory = 10) => {
  const [value, setValue] = useState(initialValue);
  const history = useRef([initialValue]);
  const currentIndex = useRef(0);
  const setValueWithHistory = useCallback((newValue, skipPush = false) => {
    if (!skipPush) {
      const currentValue = history.current[currentIndex.current];
      if (newValue === currentValue) return;
      history.current = history.current.slice(0, currentIndex.current + 1);
      history.current.push(newValue);
      if (history.current.length > maxHistory) {
        history.current.shift();
      } else {
        currentIndex.current++;
      }
    }
    setValue(newValue);
  }, [maxHistory]);
  const undo = useCallback(() => {
    if (currentIndex.current > 0) {
      currentIndex.current--;
      setValue(history.current[currentIndex.current]);
      return true;
    }
    return false;
  }, []);
  const redo = useCallback(() => {
    if (currentIndex.current < history.current.length - 1) {
      currentIndex.current++;
      setValue(history.current[currentIndex.current]);
      return true;
    }
    return false;
  }, []);
  const resetHistory = useCallback((newInitialValue = initialValue) => {
    history.current = [newInitialValue];
    currentIndex.current = 0;
    setValue(newInitialValue);
  }, [initialValue]);
  const canUndo = currentIndex.current > 0;
  const canRedo = currentIndex.current < history.current.length - 1;
  return {
    value,
    setValue: setValueWithHistory,
    undo,
    redo,
    canUndo,
    canRedo,
    resetHistory
  };
};
const debounce = (fn, delay) => {
  let timeoutId;
  return (...args) => {
    clearTimeout(timeoutId);
    timeoutId = setTimeout(() => fn(...args), delay);
  };
};

(function() {

    };

  function getSelector(el) {

    let path = [];
    let current = el;
    let depth = 0;
    while (current && current.tagName !== 'BODY' && depth < 5) {
      let selector = current.tagName.toLowerCase();
      if (current.id) {
        selector += '#' + current.id;
        path.unshift(selector);
        break;

      if (current.className) {

      if (siblings.length > 1) {
